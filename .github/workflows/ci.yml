name: CI

on:
  push:
    branches: [main, db_setup, "release/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify SQLAlchemy mapper (no backref collision)
        run: |
          python -c "
          from sqlalchemy.orm import configure_mappers
          import app.db.models
          configure_mappers()
          print('mapper ok')
          "

      - name: Verify migration framework imports
        run: |
          python -c "
          from app.db.migrations.versions import register
          from app.db.migrations.runner import _MIGRATIONS
          assert len(_MIGRATIONS) >= 5, f'Expected >=5 migrations, got {len(_MIGRATIONS)}'
          print(f'migrations ok: {len(_MIGRATIONS)} registered')
          "

      - name: Run full test suite
        run: python -m pytest -q --tb=short

      - name: Compile all Python source
        run: python -m compileall -q app/ backend/

  migrations:
    name: Migration smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Apply migrations on fresh SQLite DB
        run: |
          python -c "
          import os, tempfile
          with tempfile.NamedTemporaryFile(suffix='.db', delete=False) as f:
              db_path = f.name
          os.environ['DATABASE_URL'] = f'sqlite:///{db_path}'
          # Re-import after env set
          import importlib, app.db.database as m
          importlib.reload(m)
          m.apply_migrations()
          from app.db.migrations.runner import get_current_version
          from app.db.database import engine
          v = get_current_version(engine)
          print(f'current schema version: {v}')
          assert v is not None, 'No migrations applied'
          os.unlink(db_path)
          print('migration smoke test ok')
          "

  queue-integration:
    name: Queue / worker integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run queue integration tests
        run: python -m pytest -q tests/test_queue.py --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install lint tools
        run: pip install ruff
      - name: Ruff check
        run: ruff check app/ backend/ --select E,W,F --ignore E501

  security:
    name: Security checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Bandit SAST scan
        run: |
          bandit -r app/ -ll -x app/db/migrations/ \
            --skip B101,B601,B602,B603,B607 -q

      - name: pip-audit dependency check
        run: pip-audit --requirement requirements.txt --skip-editable || true
        # || true: advisory-only; does not block CI but surfaces findings

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
