# ==============================================================================
# Technieum Docker Compose
# Usage:        docker compose up -d
# Usage (dev):  docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Usage (prod): docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ==============================================================================

services:
  technieum:
    build:
      context: .
      dockerfile: Dockerfile
    image: technieum:latest
    container_name: technieum-main
    hostname: technieum
    restart: unless-stopped

    networks:
      - technieum-net

    ports:
      - "${API_PORT:-8000}:8000"

    environment:
      TECHNIEUM_ENV: production
      TECHNIEUM_WORKER: "false"
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"

      # Paths (must match Dockerfile ENV + volume mounts below)
      TECHNIEUM_DATA: /opt/technieum/data
      TECHNIEUM_DB_PATH: /opt/technieum/data/technieum.db
      TECHNIEUM_OUTPUT_DIR: /opt/technieum/data/output
      TECHNIEUM_LOGS_DIR: /opt/technieum/data/logs
      DATABASE_URL: "sqlite:////opt/technieum/data/technieum.db"

      # API
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      API_WORKERS: "1"

      # Worker
      TECHNIEUM_WORKER_THREADS: "4"
      TECHNIEUM_QUEUE_SIZE: "100"

      # Scan timeouts (seconds)
      TECHNIEUM_WHOIS_TIMEOUT: "60"
      TECHNIEUM_SUBFINDER_TIMEOUT: "900"
      TECHNIEUM_HTTPX_TIMEOUT: "15"
      TECHNIEUM_HTTPX_RUN_TIMEOUT: "3600"
      TECHNIEUM_DNSX_TIMEOUT: "1800"
      TECHNIEUM_NUCLEI_TIMEOUT: "5400"
      TECHNIEUM_NMAP_TIMEOUT: "7200"
      TECHNIEUM_NMAP_HOST_TIMEOUT: "180"

      # API keys (sourced from host .env file)
      SHODAN_API_KEY: "${SHODAN_API_KEY:-}"
      CENSYS_API_ID: "${CENSYS_API_ID:-}"
      CENSYS_API_SECRET: "${CENSYS_API_SECRET:-}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      PDCP_API_KEY: "${PDCP_API_KEY:-}"
      SECURITYTRAILS_API_KEY: "${SECURITYTRAILS_API_KEY:-}"
      VIRUSTOTAL_API_KEY: "${VIRUSTOTAL_API_KEY:-}"
      GREYNOISE_API_KEY: "${GREYNOISE_API_KEY:-}"
      ABUSEIPDB_API_KEY: "${ABUSEIPDB_API_KEY:-}"

      # Feature flags
      TECHNIEUM_NUCLEI_UPDATE: "false"
      TECHNIEUM_CONTINUE_ON_FAIL: "true"
      TECHNIEUM_DEBUG: "false"

    volumes:
      - ./data:/opt/technieum/data
      - ./output:/opt/technieum/data/output
      - ./logs:/opt/technieum/data/logs
      - ./config:/opt/technieum/config:ro

    command: ["combined"]

    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "2"
          memory: 4G

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ==============================================================================
# NETWORKS
# ==============================================================================
networks:
  technieum-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
