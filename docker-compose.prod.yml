# ==============================================================================
# Technieum — Production Compose Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Adds: nginx reverse proxy, PostgreSQL, Redis, higher resource limits
# ==============================================================================

services:
  technieum:
    restart: always

    environment:
      TECHNIEUM_ENV: production
      TECHNIEUM_DEBUG: "false"
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      API_WORKERS: "8"
      DATABASE_URL: "postgresql://technieum:${POSTGRES_PASSWORD:-changeme}@postgres:5432/technieum"

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 16G
        reservations:
          cpus: "4"
          memory: 8G

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================================================
  # Reverse Proxy
  # ============================================================================
  nginx:
    image: nginx:stable-alpine
    container_name: technieum-nginx
    restart: always
    networks:
      - technieum-net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./dist:/usr/share/nginx/html:ro
    depends_on:
      - technieum
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================================================
  # PostgreSQL
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: technieum-postgres
    restart: always
    networks:
      - technieum-net
    environment:
      POSTGRES_USER: technieum
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-changeme}"
      POSTGRES_DB: technieum
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U technieum -d technieum"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================================================
  # Redis
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: technieum-redis
    restart: always
    networks:
      - technieum-net
    command: >-
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-technieum-redis}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  postgres-data:
  redis-data:
