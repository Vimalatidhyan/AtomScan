# ==============================================================================
# Technieum — Development Compose Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Enables live code sync via bind mounts + file watch for hot-reload
# ==============================================================================

services:
  technieum:
    build:
      context: .
      dockerfile: Dockerfile

    volumes:
      # Bind-mount source code for live editing
      - ./app:/opt/technieum/app
      - ./backend:/opt/technieum/backend
      - ./api:/opt/technieum/api
      - ./modules:/opt/technieum/modules
      - ./lib:/opt/technieum/lib
      - ./parsers:/opt/technieum/parsers
      - ./intelligence:/opt/technieum/intelligence
      - ./scripts:/opt/technieum/scripts

      # Persistent data
      - ./data:/opt/technieum/data
      - ./logs:/opt/technieum/data/logs

    develop:
      watch:
        - action: sync
          path: ./app
          target: /opt/technieum/app
        - action: sync
          path: ./backend
          target: /opt/technieum/backend
        - action: sync
          path: ./api
          target: /opt/technieum/api
        - action: sync
          path: ./modules
          target: /opt/technieum/modules
        - action: sync
          path: ./lib
          target: /opt/technieum/lib
        - action: sync
          path: ./parsers
          target: /opt/technieum/parsers
        - action: sync
          path: ./intelligence
          target: /opt/technieum/intelligence
        - action: sync
          path: ./scripts
          target: /opt/technieum/scripts
        - action: rebuild
          path: requirements.txt
        - action: rebuild
          path: requirements-api.txt
        - action: rebuild
          path: Dockerfile

    environment:
      TECHNIEUM_ENV: development
      TECHNIEUM_DEBUG: "true"
      PYTHONUNBUFFERED: "1"
      API_WORKERS: "1"

    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 2G
